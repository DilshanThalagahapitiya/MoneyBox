<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Money Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .admin-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    
    .admin-header h1 {
      font-size: 1.8rem;
    }

    .table-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    th {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.02);
    }

    td {
      font-size: 0.95rem;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.pending { background: rgba(234, 179, 8, 0.15); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); }
    .badge.approved { background: rgba(34, 197, 94, 0.15); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }
    .badge.blocked { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }

    .action-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .action-btn.approve {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.4);
      color: #86efac;
    }
    .action-btn.approve:hover { background: rgba(34, 197, 94, 0.25); }

    .action-btn.block {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }
    .action-btn.block:hover { background: rgba(239, 68, 68, 0.25); }
    
    .actions {
      display: flex;
      gap: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1>Admin Dashboard</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.2rem;">Manage users and access permissions</p>
      </div>
      <div>
        <button id="logout-btn" type="button" class="btn-logout">Logout</button>
      </div>
    </div>

    <div class="table-card">
      <table id="users-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    async function loadUsers() {
      let user = null;
      try {
        const authRes = await fetch("/api/auth/me");
        const authData = await authRes.json();
        user = authData.user;
      } catch(e) {}

      if (!user) {
        window.location.href = "/admin-login.html";
        return;
      }
      if (!user.is_admin) {
        alert("Access Denied: You are not an admin.");
        window.location.href = "/";
        return;
      }

      try {
        const response = await fetch("/api/admin/users");
        if (!response.ok) throw new Error("Failed to load users");
        const data = await response.json();
        
        const tbody = document.querySelector("#users-table tbody");
        tbody.innerHTML = "";

        data.users.forEach(u => {
          const tr = document.createElement("tr");
          
          let actionBtns = "";
          if (u.id !== user.id) {
            if (u.status === "pending") {
              actionBtns += `<button class="action-btn approve" onclick="updateStatus(${u.id}, 'approved')">Approve</button>`;
            } else if (u.status === "approved") {
              actionBtns += `<button class="action-btn block" onclick="updateStatus(${u.id}, 'blocked')">Block</button>`;
            } else if (u.status === "blocked") {
              actionBtns += `<button class="action-btn approve" onclick="updateStatus(${u.id}, 'approved')">Unblock</button>`;
            }
          }

          tr.innerHTML = `
            <td>${u.id}</td>
            <td style="font-weight: 600;">${u.name}</td>
            <td style="color: var(--text-muted);">${u.email}</td>
            <td>${u.is_admin ? "Admin" : "User"}</td>
            <td><span class="badge ${u.status}">${u.status}</span></td>
            <td class="actions">${actionBtns}</td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        console.error(err);
        alert("Failed to load users. See console for details.");
      }
    }

    async function updateStatus(userId, status) {
      if (!confirm(`Are you sure you want to change user ${userId} status to ${status}?`)) return;
      
      try {
        const res = await fetch(`/api/admin/users/${userId}/status`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status })
        });
        
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Update failed");
        }
        
        loadUsers();
      } catch (err) {
        console.error(err);
        alert(err.message);
      }
    }

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/admin-login.html";
    });

    // Init
    loadUsers();
  </script>
</body>
</html>
