<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Money Collection</title>
  <meta name="description" content="Reset your MoneyBox account password.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; }

    .auth-icon-wrap {
      width: 56px;
      height: 56px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-brand-icon">💰</div>
        <span class="auth-brand-name">MoneyBox</span>
      </div>

      <!-- Icon + Heading -->
      <div class="auth-icon-wrap">🔑</div>
      <h1>Forgot password?</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link</p>

      <!-- Form -->
      <form id="auth-form" class="auth-form" novalidate>
        <label>
          Email address
          <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </label>

        <p id="form-message" class="form-message" aria-live="polite"></p>

        <button type="submit" class="auth-submit-btn">Send Reset Link</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <p class="auth-links"><a href="/login.html">← Back to sign in</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    setupAuthForm({
      formId: "auth-form",
      submitUrl: "/api/auth/forgot-password",
      onSuccess: (data, setMessage) => {
        let message = data.message || "Check your email for reset instructions.";
        if (data.reset_url) {
          message += ` Dev link: ${data.reset_url}`;
        }
        setMessage(message, false);
      },
      getPayload: (formData) => ({
        email: formData.get("email"),
      }),
    });
  </script>
</body>
</html>
