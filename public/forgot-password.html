<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Money Collection</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Forgot Password</h1>
      <p class="subtitle">Enter your email to get a reset link</p>

      <form id="auth-form" class="auth-form" novalidate>
        <label>
          Email
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <p id="form-message" class="form-message" aria-live="polite"></p>
        <button type="submit" class="btn-primary">Send Reset Link</button>
      </form>

      <p class="auth-links">
        <a href="/login.html">Back to sign in</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    setupAuthForm({
      formId: "auth-form",
      submitUrl: "/api/auth/forgot-password",
      onSuccess: (data, setMessage) => {
        let message = data.message || "Check your email for reset instructions.";
        if (data.reset_url) {
          message += ` Dev link: ${data.reset_url}`;
        }
        setMessage(message, false);
      },
      getPayload: (formData) => ({
        email: formData.get("email"),
      }),
    });
  </script>
</body>
</html>
