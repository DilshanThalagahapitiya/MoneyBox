<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Money Collection</title>
  <meta name="description" content="Create a free MoneyBox account to start tracking your collections.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-brand-icon">💰</div>
        <span class="auth-brand-name">MoneyBox</span>
      </div>

      <!-- Heading -->
      <h1>Admin account</h1>
      <p class="subtitle">Create an admin account to manage users</p>

      <!-- Form -->
      <form id="auth-form" class="auth-form" novalidate>
        <label>
          Full name
          <input type="text" name="name" placeholder="John Doe" autocomplete="name" required>
        </label>

        <label>
          Profile Picture (Optional)
          <input type="file" id="profile-pic-input" accept="image/*" style="font-size:0.85rem; padding:0.5rem; background: rgba(255,255,255,0.05); border-radius: var(--radius-sm);">
        </label>

        <label>
          Email address
          <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </label>

        <label>
          Password
          <input type="password" name="password" placeholder="Min. 6 characters" autocomplete="new-password" minlength="6" required>
        </label>

        <p id="form-message" class="form-message" aria-live="polite"></p>

        <button type="submit" class="auth-submit-btn">Create Account</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <p class="auth-links">Already an admin? <a href="/admin-login.html">Sign in</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    let uploadedProfilePicture = null;
    const fileInput = document.getElementById("profile-pic-input");
    if (fileInput) {
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => { uploadedProfilePicture = e.target.result; };
          reader.readAsDataURL(file);
        }
      });
    }

    setupAuthForm({
      formId: "auth-form",
      submitUrl: "/api/auth/admin-signup",
      getPayload: (formData) => ({
        name: formData.get("name"),
        email: formData.get("email"),
        password: formData.get("password"),
        profile_picture: uploadedProfilePicture,
      }),
    });
  </script>
</body>
</html>
