<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Money Collection</title>
  <meta name="description" content="Choose a new password for your MoneyBox account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; }

    .auth-icon-wrap {
      width: 56px;
      height: 56px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 1.25rem;
    }

    .password-strength {
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      margin-top: 0.4rem;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-brand-icon">💰</div>
        <span class="auth-brand-name">MoneyBox</span>
      </div>

      <!-- Icon + Heading -->
      <div class="auth-icon-wrap">🔒</div>
      <h1>Reset password</h1>
      <p class="subtitle">Choose a strong new password for your account</p>

      <!-- Form -->
      <form id="auth-form" class="auth-form" novalidate>
        <input type="hidden" name="token" id="reset-token">

        <label>
          New password
          <input type="password" id="new-password" name="password" placeholder="Min. 6 characters" autocomplete="new-password" minlength="6" required>
          <div class="password-strength">
            <div class="password-strength-bar" id="strength-bar"></div>
          </div>
        </label>

        <p id="form-message" class="form-message" aria-live="polite"></p>

        <button type="submit" class="auth-submit-btn">Update Password</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <p class="auth-links"><a href="/login.html">← Back to sign in</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    // Populate token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    document.getElementById("reset-token").value = token;

    if (!token) {
      document.getElementById("form-message").textContent = "Invalid reset link. Please request a new one.";
    }

    // Password strength indicator
    document.getElementById("new-password").addEventListener("input", function () {
      const val = this.value;
      const bar = document.getElementById("strength-bar");
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const colors = ["", "#ef4444", "#f97316", "#eab308", "#22c55e", "#6366f1"];
      const widths = ["0%", "20%", "40%", "60%", "80%", "100%"];
      bar.style.width = widths[strength];
      bar.style.background = colors[strength];
    });

    setupAuthForm({
      formId: "auth-form",
      submitUrl: "/api/auth/reset-password",
      successRedirect: "/login.html",
      successMessage: "Password updated. Redirecting to sign in...",
      getPayload: (formData) => ({
        token: formData.get("token"),
        password: formData.get("password"),
      }),
    });
  </script>
</body>
</html>
