<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Money Collection</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Reset Password</h1>
      <p class="subtitle">Choose a new password</p>

      <form id="auth-form" class="auth-form" novalidate>
        <input type="hidden" name="token" id="reset-token">
        <label>
          New Password
          <input type="password" name="password" autocomplete="new-password" minlength="6" required>
        </label>
        <p id="form-message" class="form-message" aria-live="polite"></p>
        <button type="submit" class="btn-primary">Update Password</button>
      </form>

      <p class="auth-links">
        <a href="/login.html">Back to sign in</a>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    document.getElementById("reset-token").value = token;

    if (!token) {
      setFormMessage("Invalid reset link. Request a new one.", true);
    }

    setupAuthForm({
      formId: "auth-form",
      submitUrl: "/api/auth/reset-password",
      successRedirect: "/login.html",
      successMessage: "Password updated. Redirecting to sign in...",
      getPayload: (formData) => ({
        token: formData.get("token"),
        password: formData.get("password"),
      }),
    });
  </script>
</body>
</html>
